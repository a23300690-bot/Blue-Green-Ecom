<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaijudo — Orden confirmada</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .confirm-wrap {
      display:flex; align-items:center; justify-content:center;
      min-height: calc(100vh - 62px);
      padding: 2rem 1rem;
    }
    .confirm-card {
      max-width: 520px; width:100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 2.5rem 2rem;
      text-align: center;
    }
    .success-icon {
      width: 64px; height: 64px;
      background: var(--green-dim);
      border: 1px solid rgba(45,212,160,.3);
      border-radius: 50%;
      display: flex; align-items:center; justify-content:center;
      margin: 0 auto 1.5rem;
      color: var(--green);
    }
    .order-num {
      font-family: var(--font-mono);
      font-size: .875rem;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: .5rem 1rem;
      display:inline-block;
      margin: .75rem 0 1.5rem;
    }
  </style>
</head>
<body>
<nav>
  <a href="../index.html" class="nav-brand">
    <span class="nav-brand-dot"></span>
    Kaijudo
  </a>
</nav>

<div class="confirm-wrap">
  <div class="confirm-card">
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h2 style="font-family:var(--font-display);font-size:1.5rem;font-weight:700;margin-bottom:.4rem;">¡Orden confirmada!</h2>
    <p class="text-muted" style="font-size:.9rem">Tu pedido fue registrado correctamente.</p>

    <div class="order-num" id="order-num">Cargando...</div>

    <div id="order-detail" style="text-align:left;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:1rem;margin-bottom:1.5rem;font-size:.875rem;"></div>

    <div class="flex flex-col gap-2">
      <a href="historial.html" class="btn btn-secondary w-100">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M12 7v5l4 2"/></svg>
        Ver mis órdenes
      </a>
      <a href="../index.html" class="btn btn-ghost w-100">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Seguir comprando
      </a>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
const params  = new URLSearchParams(window.location.search);
const ordenId = params.get('orden_id');

if (!ordenId) window.location.href = '../index.html';

document.getElementById('order-num').textContent = `Orden #${ordenId}`;

async function loadOrden() {
  try {
    const orden  = await Ordenes.get(ordenId);
    const detail = document.getElementById('order-detail');
    detail.innerHTML = `
      <div class="flex-between mb-1">
        <span class="text-muted">Estado</span>
        <span class="badge badge-${orden.estado}">${orden.estado}</span>
      </div>
      <div class="flex-between mb-1">
        <span class="text-muted">Método de pago</span>
        <span>${orden.metodo_pago.replace(/_/g,' ')}</span>
      </div>
      <hr class="divider">
      ${(orden.items || []).map(i => `
        <div class="flex-between" style="margin-bottom:.3rem;">
          <span>${i.nombre_producto} <span class="text-muted">x${i.cantidad}</span></span>
          <span style="font-family:var(--font-mono);color:var(--accent-2)">$${i.subtotal.toFixed(2)}</span>
        </div>`).join('')}
      <hr class="divider">
      <div class="flex-between">
        <span class="text-muted">Total</span>
        <span style="font-family:var(--font-mono);font-size:1.1rem;font-weight:600;color:var(--accent-2)">$${orden.total.toFixed(2)}</span>
      </div>`;
  } catch { /* silent */ }
}

loadOrden();
</script>
</body>
</html>
